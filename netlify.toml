[build]
  # 1. Build the library CSS.
  # 2. Copy dist into docs/ so docs/index.html can load dist/motion.min.css
  #    without needing ../dist/ (which breaks when Netlify serves docs/ as root).
  command = "npm run build && cp -r dist docs/dist"
  publish = "docs"

[build.environment]
  NODE_VERSION = "18"
