[build]
  # 1. Build the library CSS + JS engines.
  # 2. Copy dist into docs/ so docs/index.html and docs/docs.html can load
  #    dist/motion.min.css without needing ../dist/ (which breaks when Netlify
  #    serves docs/ as the web root).
  command = "npm run build && cp -r dist docs/dist"
  publish = "docs"

[build.environment]
  NODE_VERSION = "20"

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'"

# Long-lived immutable cache for versioned assets
[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages: always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
