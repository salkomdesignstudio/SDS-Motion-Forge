<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDS Motion Forge — loaders-only bundle</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #f7f7f9; margin: 2rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 24px; }
      .cell { background: #fff; border-radius: 12px; padding: 20px 8px; display: flex; flex-direction: column; align-items: center; gap: 14px; min-height: 120px; justify-content: center; }
      .cell code { font-size: 10px; color: #555; word-break: break-all; text-align: center; }
    </style>
  </head>
  <body>
    <h1>Loaders-only bundle (<code>categories/loaders</code>)</h1>
    <p id="meta"></p>
    <div class="grid" id="grid"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
